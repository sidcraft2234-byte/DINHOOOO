<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINHOOOO • Animes, Filmes e Séries</title>
   
    <style>
        @font-face {
            font-family: 'Blue Winter';
            src: url('fonts/BlueWinter.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
       
        :root {
            --cor-principal: #450658;
            --cor-secundaria: #96f43f;
            --bg-dark: #121212;
            --text-light: #ffffff;
            --text-muted: #b3b3b3;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: 'Blue Winter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
       
        .logo { font-size: 2.4rem; font-weight: 700; color: var(--cor-secundaria); text-decoration: none; }
        .menu { display: flex; gap: 2.5rem; list-style: none; }
        .menu a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .menu a:hover { color: var(--cor-secundaria); }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 30px; height: 3px; background: white; }
        #home {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 6% 0 12%;
        }
       
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease;
            z-index: 1;
        }
       
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(15,15,15,0.85) 40%, rgba(15,15,15,0.4) 70%, transparent);
            z-index: 2;
        }
       
        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 50%;
        }
       
        .featured-title {
            font-size: 4.5rem;
            margin: 0.8rem 0 1rem;
            line-height: 1.1;
            text-shadow: 0 3px 15px black;
        }
       
        .featured-desc {
            font-size: 1.6rem;
            max-width: 600px;
            margin-bottom: 2.5rem;
            color: var(--text-muted);
            text-shadow: 0 2px 10px black;
        }
       
        .btn-watch {
            padding: 16px 48px;
            font-size: 1.4rem;
            background: var(--cor-secundaria);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
       
        .btn-watch:hover { background: #a5ff4f; transform: scale(1.05); }
        .hero-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            font-size: 3rem;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
       
        .hero-arrow:hover { background: var(--cor-secundaria); transform: translateY(-50%) scale(1.1); }
        .left { left: 4%; }
        .right { right: 4%; }
        .section { padding: 80px 5% 40px; }
        .section-title { font-size: 2.2rem; margin-bottom: 30px; color: var(--cor-secundaria); }
       
        .carousel { display: flex; gap: 20px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 20px; }
        .carousel::-webkit-scrollbar { display: none; }
       
        .card {
            min-width: 240px;
            height: 360px;
            background-size: cover;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s;
        }
       
        .card:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(150,244,63,0.4); }
       
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
       
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 1100px; background: #000; position: relative; border-radius: 12px; overflow: hidden; }
        .close { position: absolute; top: 15px; right: 25px; color: white; font-size: 3rem; cursor: pointer; z-index: 10; }
       
        @media (max-width: 768px) {
            .hero-content { max-width: 90%; text-align: center; padding: 0 5%; }
            .featured-title { font-size: 3rem; }
            .featured-desc { font-size: 1.3rem; }
            .hero-arrow { width: 50px; height: 50px; font-size: 2.2rem; }
            .hamburger { display: flex; }
            .menu { display: none; position: absolute; top: 70px; left: 0; width: 100%; background: var(--bg-dark); flex-direction: column; padding: 1rem; }
            .menu.active { display: flex; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">DINHOOOO</a>
        <ul class="menu" id="menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#animes">Animes</a></li>
            <li><a href="#series">Séries</a></li>
            <li><a href="#filmes">Filmes</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
        <div class="hamburger" onclick="document.getElementById('menu').classList.toggle('active')">
            <span></span><span></span><span></span>
        </div>
    </nav>
    <section id="home" style="height: 100vh; position: relative;">
        <div id="hero-bg" class="hero-bg"></div>
        <div class="hero-overlay"></div>
       
        <button class="hero-arrow left" onclick="prevFeatured()">‹</button>
        <button class="hero-arrow right" onclick="nextFeatured()">›</button>
       
        <div class="hero-content">
            <h2 id="featured-title" class="featured-title"></h2>
            <p id="featured-desc" class="featured-desc"></p>
            <button class="btn-watch" onclick="playCurrentFeatured()">Assistir Agora</button>
        </div>
    </section>
    <section class="section" id="animes">
        <h2 class="section-title">Animes em Destaque</h2>
        <div class="carousel" id="animes-carousel"></div>
    </section>
    <!-- Player Modal -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('player-modal').style.display='none'">×</span>
            <div id="player-container"></div>
            <div style="padding:20px; background:#1f1f1f;">
                <h3 id="player-title" style="color:var(--cor-secundaria);"></h3>
                <p id="player-desc" style="color:var(--text-muted);"></p>
            </div>
        </div>
    </div>
    <script>
        const featured = [
            {
                title: "Demon Slayer: Kimetsu no Yaiba",
                desc: "Tanjiro e os Hashira na luta final contra Muzan! Respiração do Sol no limite 🔥",
                img: "animes/demon-slayer/images/akaza-poster.jpg",
                page: "demon-slayer.html"
            },
            {
                title: "Frieren: Beyond Journey's End",
                desc: "A jornada eterna da elfa maga Frieren após a derrota do Rei Demônio – reflexões sobre tempo, amizade e vida.",
                img: "animes/frieren/images/frieren-poster.jpeg",
                page: null  // sem página ainda
            },
            {
                title: "Jujutsu Kaisen: Arco Shinjuku",
                desc: "A batalha final contra Sukuna está apenas começando!",
                img: "animes/jujutsu-kaisen/images/jjk-poster.jpg",
                page: "jujutsu-kaisen.html"  // ← abre a página do Jujutsu Kaisen
            }
        ];
        let currentFeatured = 0;
        let featuredInterval;
        function updateFeatured() {
            const bg = document.getElementById('hero-bg');
            bg.style.opacity = 0;
            setTimeout(() => {
                bg.style.backgroundImage = `url('${featured[currentFeatured].img}')`;
                document.getElementById('featured-title').textContent = featured[currentFeatured].title;
                document.getElementById('featured-desc').textContent = featured[currentFeatured].desc;
                bg.style.opacity = 1;
            }, 800);
        }
        function nextFeatured() {
            clearInterval(featuredInterval);
            currentFeatured = (currentFeatured + 1) % featured.length;
            updateFeatured();
            featuredInterval = setInterval(nextFeatured, 6000);
        }
        function prevFeatured() {
            clearInterval(featuredInterval);
            currentFeatured = (currentFeatured - 1 + featured.length) % featured.length;
            updateFeatured();
            featuredInterval = setInterval(nextFeatured, 6000);
        }
        function playCurrentFeatured() {
            const current = featured[currentFeatured];
            if (current.page) {
                window.location.href = current.page;
            } else {
                alert("Assistir " + current.title + " (em desenvolvimento)");
            }
        }
        window.onload = () => {
            updateFeatured();
            featuredInterval = setInterval(nextFeatured, 6000);
            const animesCarousel = document.getElementById('animes-carousel');
            const animes = [
                {
                    title: "Demon Slayer: Kimetsu no Yaiba",
                    img: "animes/demon-slayer/images/akaza-poster.jpg",
                    page: "demon-slayer.html"
                },
                {
                    title: "Frieren: Beyond Journey's End",
                    img: "animes/frieren/images/frieren-poster.jpg",
                    page: null
                },
                {
                    title: "Jujutsu Kaisen",
                    img: "animes/jujutsu-kaisen/images/jjk-poster.jpg",
                    page: "jujutsu-kaisen.html"  // ← abre a página do Jujutsu Kaisen
                }
            ];
            animes.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${anime.img}')`;
                card.innerHTML = `<div class="card-info"><div class="card-title">${anime.title}</div></div>`;
               
                card.onclick = () => {
                    if (anime.page) {
                        window.location.href = anime.page;
                    } else {
                        alert(`Abrindo detalhes de ${anime.title} (em desenvolvimento)`);
                    }
                };
               
                animesCarousel.appendChild(card);
            });
        };
    </script>
</body>
</html>
